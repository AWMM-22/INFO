<!DOCTYPE html>
<html>
<head>

<title>Fetch API Demo</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
    text-align:center;
    padding:30px;
}

h1{
    color:#333;
}

button{
    background-color:#007bff;
    color:white;
    border:none;
    padding:10px 20px;
    margin:10px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background-color:#0056b3;
}

#output{
    width:60%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    min-height:100px;
}

</style>

</head>

<body>

<h1>Fetch API Examples</h1>

<button onclick="getWeather()">
Weather
</button>

<button onclick="getJoke()">
Random Joke
</button>

<button onclick="getGithub()">
GitHub User
</button>

<div id="output">
Click any button to fetch data...
</div>

<script>

function getWeather()
{
fetch("https://api.open-meteo.com/v1/forecast?latitude=19.03&longitude=73.10&current_weather=true")

.then(response => response.json())

.then(data => {

document.getElementById("output").innerHTML =

"<h2>Weather Information</h2>" +

"<p><b>Temperature:</b> "
+ data.current_weather.temperature +
" °C</p>" +

"<p><b>Wind Speed:</b> "
+ data.current_weather.windspeed +
" km/h</p>";

})

.catch(error => console.log(error));
}


function getJoke()
{
fetch("https://official-joke-api.appspot.com/random_joke")

.then(response => response.json())

.then(data => {

document.getElementById("output").innerHTML =

"<h2>Random Joke</h2>" +

"<p>" + data.setup + "</p>" +

"<p><b>" + data.punchline + "</b></p>";

})

.catch(error => console.log(error));
}


function getGithub()
{
fetch("https://api.github.com/users/octocat")

.then(response => response.json())

.then(data => {

document.getElementById("output").innerHTML =

"<h2>GitHub User</h2>" +

"<p><b>Username:</b> "
+ data.login + "</p>" +

"<p><b>Followers:</b> "
+ data.followers + "</p>" +

"<p><b>Repositories:</b> "
+ data.public_repos + "</p>";

})

.catch(error => console.log(error));
}

</script>

</body>
</html>
