<!DOCTYPE html>
<html>
<head>
    <title>Grocery Mart</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        header{
            background:green;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
        }

        section{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:30px;
        }

        article{
            border:1px solid gray;
            width:200px;
            padding:15px;
            text-align:center;
            border-radius:10px;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }

    </style>

</head>

<body>

<header>
    <h1>Grocery Mart</h1>
    <p>Fresh Fruits and Vegetables</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
</nav>

<section>

    <article>
        <h2>Apples</h2>
        <p>Fresh Red Apples</p>
        <p>₹120/kg</p>
    </article>

    <article>
        <h2>Bananas</h2>
        <p>Organic Bananas</p>
        <p>₹60/dozen</p>
    </article>

    <article>
        <h2>Tomatoes</h2>
        <p>Farm Fresh Tomatoes</p>
        <p>₹40/kg</p>
    </article>

</section>

<footer>
    <p>© 2026 Grocery Mart | All Rights Reserved</p>
</footer>

</body>
</html>
